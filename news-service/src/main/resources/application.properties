# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8080

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=newsalert
quarkus.datasource.password=newsalert
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/newsalert

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
quarkus.hibernate-orm.database.generation=update
quarkus.hibernate-orm.log.sql=false

# ── Hibernate Search / Elasticsearch ─────────────────────────────────────────
# Production (Docker Compose): elasticsearch:9200
quarkus.hibernate-search-orm.elasticsearch.version=8
quarkus.hibernate-search-orm.elasticsearch.hosts=elasticsearch:9200
quarkus.hibernate-search-orm.elasticsearch.protocol=HTTP
quarkus.hibernate-search-orm.schema-management.strategy=create-or-validate
quarkus.hibernate-search-orm.automatic-indexing.synchronization.strategy=write-sync

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=kafka:29092

# Topic: crawler publishes new-result summaries (JSON) here
mp.messaging.outgoing.new-results.connector=smallrye-kafka
mp.messaging.outgoing.new-results.topic=new-results
mp.messaging.outgoing.new-results.value.serializer=org.apache.kafka.common.serialization.StringSerializer

# Dev override: Kafka on localhost
%dev.kafka.bootstrap.servers=localhost:9092

# ── SearXNG REST client ───────────────────────────────────────────────────────
# Production (Docker Compose): searxng container exposes port 8080 internally
quarkus.rest-client.searxng.url=http://searxng:8080
quarkus.rest-client.searxng.connect-timeout=5000
quarkus.rest-client.searxng.read-timeout=10000

# Dev override: SearXNG mapped to host port 8888
%dev.quarkus.rest-client.searxng.url=http://localhost:8888

# ── Alert-service internal REST client ───────────────────────────────────────
quarkus.rest-client.alert-service.url=http://alert-service:8081
quarkus.rest-client.alert-service.connect-timeout=3000
quarkus.rest-client.alert-service.read-timeout=5000

%dev.quarkus.rest-client.alert-service.url=http://localhost:8081

# ── Scheduler (poll SearXNG every 15 minutes) ────────────────────────────────
newsalert.scheduler.cron=0 0/15 * * * ?

# ── Mailer ────────────────────────────────────────────────────────────────────
quarkus.mailer.from=newsalert@example.com
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.mock=true

# ── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=NewsAlert News Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Fetches and indexes news articles matching user keywords
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ── Dev profile overrides ─────────────────────────────────────────────────────
%dev.quarkus.hibernate-orm.database.generation=drop-and-create
%dev.quarkus.mailer.mock=true
%dev.quarkus.hibernate-search-orm.schema-management.strategy=drop-and-create-and-drop
%dev.quarkus.hibernate-search-orm.elasticsearch.hosts=localhost:9200

# ── Test profile ──────────────────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/newsalert_test
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.hibernate-search-orm.enabled=false
%test.quarkus.mailer.mock=true
