# ── HTTP ──────────────────────────────────────────────────────────────────────
quarkus.http.port=8081

# ── DataSource (PostgreSQL) ───────────────────────────────────────────────────
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=newsalert
quarkus.datasource.password=newsalert
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/newsalert

# ── Hibernate ORM ─────────────────────────────────────────────────────────────
# DDL is managed entirely by Flyway – Hibernate must not touch the schema
quarkus.hibernate-orm.database.generation=none
quarkus.hibernate-orm.log.sql=false

# ── Flyway ────────────────────────────────────────────────────────────────────
quarkus.flyway.migrate-at-start=true
quarkus.flyway.locations=db/migration
quarkus.flyway.baseline-on-migrate=false
quarkus.flyway.validate-on-migrate=true

# ── Hibernate Search / Elasticsearch ─────────────────────────────────────────
quarkus.hibernate-search-orm.elasticsearch.hosts=elasticsearch:9200
quarkus.hibernate-search-orm.elasticsearch.protocol=HTTP
quarkus.hibernate-search-orm.schema-management.strategy=create-or-validate
quarkus.hibernate-search-orm.automatic-indexing.synchronization.strategy=async

%dev.quarkus.hibernate-search-orm.elasticsearch.hosts=localhost:9200

# ── Kafka ─────────────────────────────────────────────────────────────────────
kafka.bootstrap.servers=kafka:29092

# Topic: new-result summaries from news-service crawler
mp.messaging.incoming.new-results.connector=smallrye-kafka
mp.messaging.incoming.new-results.topic=new-results
mp.messaging.incoming.new-results.value.deserializer=org.apache.kafka.common.serialization.StringDeserializer
mp.messaging.incoming.new-results.group.id=alert-service-notifier
mp.messaging.incoming.new-results.auto.offset.reset=earliest

%dev.kafka.bootstrap.servers=localhost:9092

# ── News-service REST client ──────────────────────────────────────────────────
quarkus.rest-client.news-service.url=http://news-service:8080
quarkus.rest-client.news-service.connect-timeout=3000
quarkus.rest-client.news-service.read-timeout=8000

%dev.quarkus.rest-client.news-service.url=http://localhost:8080

# ── Mailer ────────────────────────────────────────────────────────────────────
quarkus.mailer.from=newsalert@example.com
quarkus.mailer.host=localhost
quarkus.mailer.port=1025
quarkus.mailer.mock=true

# ── JWT ───────────────────────────────────────────────────────────────────────
mp.jwt.verify.publickey.location=META-INF/resources/publicKey.pem
mp.jwt.verify.issuer=https://newsalert.local
quarkus.smallrye-jwt.enabled=true

# Private key used by Jwt.sign() in AuthResource
smallrye.jwt.sign.key.location=META-INF/resources/privateKey.pem

# ── OpenAPI ───────────────────────────────────────────────────────────────────
quarkus.smallrye-openapi.info-title=NewsAlert Alert Service API
quarkus.smallrye-openapi.info-version=1.0.0
quarkus.smallrye-openapi.info-description=Manages user subscriptions and dispatches email alerts
quarkus.swagger-ui.always-include=true
quarkus.swagger-ui.path=/swagger-ui

# ── Dev profile overrides ─────────────────────────────────────────────────────
%dev.quarkus.flyway.clean-at-start=true
%dev.quarkus.mailer.mock=true
%dev.quarkus.hibernate-search-orm.schema-management.strategy=drop-and-create-and-drop

# ── Test profile ──────────────────────────────────────────────────────────────
%test.quarkus.datasource.db-kind=postgresql
%test.quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5432/newsalert_test
%test.quarkus.flyway.clean-at-start=true
%test.quarkus.hibernate-search-orm.enabled=false
%test.quarkus.mailer.mock=true
